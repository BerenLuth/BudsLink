name: Release Flatpak

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Flatpak (${{ matrix.variant.arch }})
    runs-on: ${{ matrix.variant.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    strategy:
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.maniacx.BudsLink.yml
          bundle: BudsLink-${{ github.ref_name }}-${{ matrix.variant.arch }}.flatpak
          arch: ${{ matrix.variant.arch }}
          cache-key: flatpak-builder-${{ matrix.variant.arch }}-${{ github.sha }}
          upload-artifact: true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create source archive
        run: |
          set -e

          TAG="${GITHUB_REF_NAME}"
          NAME="BudsLink-${TAG}"
          OUTDIR="release-source"

          mkdir -p "$OUTDIR"

          git archive --format=tar.gz --prefix="$NAME/" -o "$OUTDIR/$NAME.tar.gz" HEAD

          mv "$OUTDIR/$NAME.tar.gz" artifacts/

      - name: Generate Flathub manifest
        run: |
          set -e

          TAG="${GITHUB_REF_NAME}"
          NAME="BudsLink-${TAG}.tar.gz"

          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${NAME}"

          SHA=$(sha256sum "artifacts/$NAME" | cut -d ' ' -f1)

          sed \
            -e "s|@URL@|$URL|g" \
            -e "s|@SHA@|$SHA|g" \
            build-aux/flathub-manifest.yml \
            > artifacts/flathub-manifest.yml

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.flatpak
            artifacts/*.tar.gz
            artifacts/flathub-manifest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
