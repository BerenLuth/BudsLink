app-id: io.github.maniacx.BudsLink
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: budslink

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --env=PULSE_PROP_media.category=Manager
  - --system-talk-name=org.bluez
  - --talk-name=org.mpris.MediaPlayer2.*
  - --own-name=io.github.maniacx.BudsLink
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: BudsLink
    buildsystem: meson
    sources:
      - type: dir
        path: .

